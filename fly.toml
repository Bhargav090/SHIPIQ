# Fly.io deployment config
# Deploy: fly launch (first time) → fly deploy

app = "shipiq-cargo-optimizer"
primary_region = "bom"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  PORT = "3000"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
